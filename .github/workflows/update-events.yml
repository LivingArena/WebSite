name: Aggiorna eventi Verona

on:
  schedule:
    - cron: "10 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Installa Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installa dipendenze
        run: npm install

      - name: Aggiorna events.json
        run: npm run update-events

      - name: Salva modifiche su GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Aggiornamento automatico eventi Verona"
          file_pattern: events.json
